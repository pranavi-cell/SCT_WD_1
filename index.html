<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"

<body>

<!-- NAVBAR -->
<nav id="navbar">

<div class="logo">
    Stream<span>Flix</span>
</div>

<ul class="nav-links">

</div>

<section class="hero">

<div class="overlay">
